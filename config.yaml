data_config:
  company_path: generated_data/company.csv
  demand_path: generated_data/demand.csv
  output_dir: generated_data/model_outputs
  keys:
    date: date
    country: country
    sku: sku
    target: demand
  company_feature_columns:
    - is_holiday
    - website_traffic
    - add_to_carts
    - conversion_rate

feature_config:
  groups:
    group_1:
      includes:
        - website_traffic
        - demand
      apply:
        lag: [1, 3, 7]
        mov: [3, 7, 14, 28]
        emov: [3, 7, 14, 28]
    group_2:
      includes:
        - add_to_carts
        - conversion_rate
      apply:
        lag: [1, 3]
        mov: [3, 7, 14]
        emov: [3, 7, 14]
  calendar_features:
    - day_of_week
    - month
    - day_of_month
    - is_weekend

training_config:
  dataset_sizes:
    training: 0.6
    validation: 0.2
    testing: 0.2
  forecast_horizon: 30
  min_history_length: 10
  ridge_alpha: 0.000001
  non_negative_predictions: true
  future_exogenous_strategy: carry_last
